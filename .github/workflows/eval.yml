# ──────────────────────────────────────────────────────────────
# WCAG Evaluation CI — runs eval suite on every pull request
# and posts a compliance summary as a PR comment.
# ──────────────────────────────────────────────────────────────
name: WCAG Eval Suite

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  evaluate:
    name: Run WCAG Evaluations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ─────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jinja2

      # ── Node + Azurite ───────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and start Azurite
        run: |
          npm install -g azurite
          mkdir -p .azurite
          azurite --silent \
            --blobPort 10000 \
            --queuePort 10001 \
            --tablePort 10002 \
            --location .azurite &

          # Wait for Azurite to be ready
          for i in $(seq 1 15); do
            if nc -z 127.0.0.1 10000 2>/dev/null; then
              echo "Azurite is ready"
              break
            fi
            sleep 1
          done

      # ── Create blob containers ───────────────────────────
      - name: Create blob containers
        run: |
          python3 -c "
          from azure.storage.blob import BlobServiceClient
          conn = 'DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;'
          client = BlobServiceClient.from_connection_string(conn)
          for c in ['uploads', 'results']:
              try:
                  client.create_container(c)
                  print(f'Created container: {c}')
              except Exception as e:
                  if 'ContainerAlreadyExists' in str(e):
                      print(f'Container exists: {c}')
                  else:
                      raise
          "

      # ── Run unit tests ──────────────────────────────────
      - name: Run pytest suite
        env:
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;"
        run: |
          python -m pytest tests/ \
            --ignore=tests/eval \
            --tb=short \
            -q \
            --timeout=60 \
            || echo "::warning::Some unit tests failed — check output above"

      # ── Run eval suite ───────────────────────────────────
      - name: Run evaluation suite
        id: eval
        env:
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;"
        run: |
          set +e
          python scripts/run_evals.py --output tests/eval/results/eval-report.json
          EVAL_EXIT=$?
          echo "eval_exit_code=$EVAL_EXIT" >> "$GITHUB_OUTPUT"

          # Render Markdown report
          python scripts/render_report.py \
            --input tests/eval/results/eval-report.json \
            --output tests/eval/results/eval-report.md \
            2>/dev/null || true

          exit 0  # Always continue to post comment

      # ── Post PR comment ──────────────────────────────────
      - name: Post eval summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read eval JSON
            const jsonPath = 'tests/eval/results/eval-report.json';
            let report;
            try {
              report = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            } catch (e) {
              core.warning(`Could not read eval report: ${e.message}`);
              return;
            }

            const summary = report.summary || {};
            const docs = report.documents || [];

            // Build compliance badge
            const hasCritical = (summary.fail || 0) > 0 || (summary.error || 0) > 0;
            const hasWarnings = (summary.warn || 0) > 0;
            let badge, statusIcon;
            if (hasCritical) {
              badge = '🔴 **FAIL**';
              statusIcon = '❌';
            } else if (hasWarnings) {
              badge = '🟡 **WARN**';
              statusIcon = '⚠️';
            } else {
              badge = '🟢 **PASS**';
              statusIcon = '✅';
            }

            // Build document table
            let table = '| Document | Pages | Time | Headings | Tables | Images | Result |\n';
            table += '|----------|------:|-----:|---------:|-------:|-------:|--------|\n';
            for (const doc of docs) {
              const resultIcon = {PASS: '✅', WARN: '⚠️', FAIL: '❌', ERROR: '💥'}[doc.result] || '❓';
              table += `| ${doc.filename} | ${doc.page_count} | ${doc.conversion_time_ms}ms | ${doc.scores.heading_hierarchy}% | ${doc.scores.table_accessibility}% | ${doc.scores.image_alt_coverage}% | ${resultIcon} ${doc.result} |\n`;
            }

            // Collect violations
            let violationSection = '';
            const allViolations = docs.flatMap(d =>
              (d.violation_details || []).map(v => ({...v, doc: d.filename}))
            );
            if (allViolations.length > 0) {
              violationSection = '\n<details>\n<summary>📋 Violation Details (' + allViolations.length + ')</summary>\n\n';
              violationSection += '| Severity | Rule | Document | Description |\n';
              violationSection += '|----------|------|----------|-------------|\n';
              for (const v of allViolations) {
                const sevIcon = {critical: '🔴', serious: '🟠', moderate: '🟡', minor: '🔵'}[v.severity] || '⚪';
                violationSection += `| ${sevIcon} ${v.severity} | \`${v.rule_id}\` | ${v.doc} | ${v.description} |\n`;
              }
              violationSection += '\n</details>';
            }

            // Compose comment body
            const body = [
              `## ${statusIcon} WCAG Eval Results`,
              '',
              `**Overall:** ${badge} — ${summary.total} documents evaluated`,
              `**Passed:** ${summary.pass} | **Warnings:** ${summary.warn} | **Failed:** ${summary.fail} | **Errors:** ${summary.error}`,
              '',
              table,
              violationSection,
              '',
              `_Generated by [WCAG Eval Suite](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`
            ].join('\n');

            // Find existing comment to update (idempotent)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## ✅ WCAG Eval Results';
            const markerAlt1 = '## ⚠️ WCAG Eval Results';
            const markerAlt2 = '## ❌ WCAG Eval Results';
            const existing = comments.data.find(c =>
              c.body.startsWith(marker) || c.body.startsWith(markerAlt1) || c.body.startsWith(markerAlt2)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info('Updated existing eval comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created eval comment');
            }

      # ── Fail on critical violations ──────────────────────
      - name: Check for critical violations
        if: always()
        run: |
          python3 -c "
          import json, sys
          try:
              with open('tests/eval/results/eval-report.json') as f:
                  report = json.load(f)
              summary = report.get('summary', {})
              fail_count = summary.get('fail', 0)
              error_count = summary.get('error', 0)
              if fail_count > 0 or error_count > 0:
                  print(f'::error::WCAG evaluation failed: {fail_count} failures, {error_count} errors')
                  sys.exit(1)
              print(f'WCAG evaluation passed: {summary.get(\"pass\", 0)}/{summary.get(\"total\", 0)} documents compliant')
          except FileNotFoundError:
              print('::error::Eval report not found — eval suite may have crashed')
              sys.exit(1)
          "

      # ── Upload artifacts ─────────────────────────────────
      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wcag-eval-results
          path: |
            tests/eval/results/eval-report.json
            tests/eval/results/eval-report.md
            tests/eval/results/html/
          retention-days: 30
